<style>
/* Custom logo and title for IDEA Team */
header.navbar .navbar-brand::before {
  content: '';
  display: inline-block;
  width: 45px;
  height: 45px;
  background-image: url('{{ "/assets/img/Yonsei_Logo.png" | relative_url }}');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  margin-right: 12px;
  vertical-align: middle;
}

header.navbar .navbar-brand {
  display: flex !important;
  align-items: center;
  font-size: 0;
}

header.navbar .navbar-brand::after {
  content: 'IDEA Team';
  font-size: 24px;
  font-weight: 500;
  color: var(--global-text-color);
  margin-left: 8px;
}

/* Hide the default site title */
header.navbar .navbar-brand .font-weight-bold {
  display: none;
}

/* Equal width columns for about page - KIXLAB style */
.about .container {
  max-width: 100% !important;
  padding: 0 40px;
}

.about .post {
  display: grid !important;
  grid-template-columns: 1fr 1fr !important;
  gap: 40px !important;
  align-items: start !important;
}

/* Text content column */
.about .post > div:first-child {
  order: 1;
}

/* Profile column */
.about .profile {
  order: 2 !important;
  width: 100% !important;
  margin: 0 !important;
  float: none !important;
}

.about .profile img {
  width: 100% !important;
  height: auto !important;
  max-width: 100% !important;
}

/* Responsive: stack on mobile */
@media (max-width: 768px) {
  .about .post {
    grid-template-columns: 1fr !important;
  }

  .about .profile {
    order: 1 !important;
  }

  .about .post > div:first-child {
    order: 2;
  }
}
</style>
